<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施工通知自动生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1b1b1f;--muted:#70737a;--line:#d7dae0;--paper:#fff;--bg:#eceef2;--accent:#2357a6;--accent-soft:#eaf1fb;--danger:#b42318;--font:"Hiragino Kaku Gothic ProN","Yu Gothic","MS Gothic",Arial,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}
button,input,select{font:inherit}
.app{display:grid;grid-template-columns:minmax(320px,430px) 1fr;min-height:100vh}
.editor{background:#fff;border-right:1px solid var(--line);padding:18px;overflow:auto}
.preview-wrap{padding:24px;overflow:auto}
h1{font-size:19px;margin-bottom:4px}
.hint{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:16px}
.group{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
.group h2{font-size:13px;color:var(--accent);margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 10px;background:#fafafa;color:var(--ink)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);background:var(--accent-soft)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,0),#fff 18%);display:flex;gap:8px;padding-top:18px;margin-top:14px}
.btn{border:1px solid var(--line);border-radius:7px;background:#fff;padding:10px 12px;cursor:pointer;white-space:nowrap}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;flex:1}
.btn:active{transform:translateY(1px)}
.steps{display:grid;gap:8px}
.step{border:1px solid var(--line);border-radius:7px;padding:9px;background:#fafafa}
.step-head{display:grid;grid-template-columns:1fr 32px;gap:8px;margin-bottom:8px}
.step button{border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:16px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 8px;font-size:12px;cursor:pointer;user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.paper{width:210mm;min-height:297mm;background:var(--paper);margin:0 auto;padding:14mm 13mm;box-shadow:0 4px 22px rgba(25,32,45,.18);font-family:"MS Gothic","Hiragino Kaku Gothic ProN","Yu Gothic",monospace;color:#000;font-size:10pt}
.p-building{font-size:9pt;margin-bottom:1pt}.p-to{font-size:9pt;margin-bottom:14pt}
.p-title-wrap{text-align:center;border-top:1.2pt solid #000;border-bottom:1.2pt solid #000;padding:7pt 0 4pt;margin-bottom:14pt}
.p-title{font-size:15pt;display:block;margin-bottom:2pt}.p-subtitle{font-size:8.5pt}
.p-body{font-size:9.5pt;line-height:1.75;margin-bottom:12pt}
table{width:100%;border-collapse:collapse}.info-table{margin-bottom:7pt;font-size:9pt}.info-table td{border:.6pt solid #000;padding:3.5pt 6pt;vertical-align:middle}.info-table .lbl{white-space:nowrap;width:32mm}
.note-text{font-size:8pt;margin-bottom:12pt}.sched-title-wrap{border-left:2.5pt solid #000;padding-left:7pt;margin-bottom:9pt}.sched-title{font-size:10.5pt}.sched-sub{font-size:8.5pt}
.sched-table{font-size:8.5pt}.sched-table th,.sched-table td{border:.6pt solid #000;padding:3.5pt 3pt;text-align:center;vertical-align:middle}.sched-table .step-label{text-align:left;padding-left:5pt;white-space:nowrap}.sched-table .note-cell{font-size:7.5pt}
.p-footer{margin-top:14pt;font-size:8.5pt}
.mobile-preview-note{display:none;color:var(--muted);font-size:12px;margin-bottom:8px}
@media(max-width:980px){.app{display:block}.editor{border-right:none;border-bottom:1px solid var(--line);padding:14px}.row{grid-template-columns:1fr}.preview-wrap{padding:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}.paper{min-width:210mm;margin:0}.mobile-preview-note{display:block}}
@media print{html,body{width:210mm;height:297mm;background:#fff}.editor{display:none}.app{display:block}.preview-wrap{padding:0;overflow:visible}.mobile-preview-note{display:none!important}.paper{box-shadow:none;margin:0;width:210mm;min-height:297mm;padding:12mm 11mm;transform:none}@page{size:A4;margin:0}}
</style>
</head>
<body>
<main class="app">
  <section class="editor">
    <h1>施工通知自动生成器</h1>
    <p class="hint">输入时间和施工项目后，会自动排成 A4 通知书。点“保存 PDF”后，在打印窗口选择“保存为 PDF”。</p>

    <div class="group">
      <h2>物件信息</h2>
      <div class="field"><label>マンション名</label><input id="building" value="ザパークハウス西新宿タワー60"></div>
      <div class="row">
        <div class="field"><label>対象住戸</label><input id="unit" value="1212号室"></div>
        <div class="field"><label>通知对象</label><input id="audience" value="居住者の皆様へ"></div>
      </div>
      <div class="field"><label>住所</label><input id="address" value="東京都新宿区西新宿5-5-1"></div>
    </div>

    <div class="group">
      <h2>施工信息</h2>
      <div class="field">
        <label>施工项目</label>
        <select id="projectType">
          <option value="クロス張替（壁紙交換）">クロス張替（壁紙交換）</option>
          <option value="床材張替">床材張替</option>
          <option value="水回り設備交換">水回り設備交換</option>
          <option value="室内リフォーム">室内リフォーム</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="field"><label>工事内容</label><input id="content" value="クロス張替（壁紙交換）"></div>
      <div class="row">
        <div class="field"><label>开始日期</label><input type="date" id="dateFrom" value="2026-07-01"></div>
        <div class="field"><label>结束日期</label><input type="date" id="dateTo" value="2026-07-03"></div>
      </div>
      <div class="row">
        <div class="field"><label>作業開始</label><input type="time" id="timeFrom" value="09:00"></div>
        <div class="field"><label>作業終了</label><input type="time" id="timeTo" value="18:00"></div>
      </div>
      <div class="field"><label>施工会社</label><input id="company" value="月輪合同会社（ゲツリン合同会社）"></div>
      <div class="field"><label>担当者・TEL</label><input id="contact" value="林 興　TEL：070-3887-7789"></div>
    </div>

    <div class="group">
      <h2>工程表</h2>
      <div id="steps" class="steps"></div>
      <button class="btn" type="button" id="addStep">＋ 添加工程</button>
    </div>

    <div class="actions">
      <button class="btn" type="button" id="refresh">重新排版</button>
      <button class="btn primary" type="button" id="print">保存 PDF</button>
    </div>
  </section>

  <section class="preview-wrap">
    <p class="mobile-preview-note">手机预览可左右滑动，保存 PDF 时会按 A4 输出。</p>
    <article id="paper" class="paper"></article>
  </section>
</main>

<script>
const weekdays=["日","月","火","水","木","金","土"];
const presets={
  "クロス張替（壁紙交換）":["スイッチカバー外し","旧壁紙の剥がし","下地確認・補修","壁紙のカット・割付","壁紙の貼り付け","端部調整・仕上げ","スイッチカバー取付","作業後の清掃","引渡し"],
  "床材張替":["既存床材の撤去","下地確認・補修","床材搬入","床材張り付け","端部調整","清掃・確認","引渡し"],
  "水回り設備交換":["養生作業","既存設備の撤去","配管確認","新規設備取付","接続・漏水確認","周辺補修","清掃・確認","引渡し"],
  "室内リフォーム":["養生作業","既存部材の撤去","下地確認・補修","新規部材施工","仕上げ調整","清掃・確認","引渡し"]
};
let days=[],steps=[];
const $=id=>document.getElementById(id);
function val(id){return ($(id)||{}).value||""}
function dateObj(v){return v?new Date(v+"T00:00:00"):null}
function jpDate(v){const d=dateObj(v);return d?`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`:""}
function shortDate(d){return `${d.getMonth()+1}/${d.getDate()}（${weekdays[d.getDay()]}）`}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function makeDays(){
  const start=dateObj(val("dateFrom")),end=dateObj(val("dateTo"));
  if(!start||!end||end<start){days=[];return}
  days=[];
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){days.push({label:shortDate(new Date(d))})}
}
function distribute(names){
  makeDays();
  const count=Math.max(days.length,1);
  steps=names.map((name,i)=>{
    const checked=Array(count).fill(0);
    const a=Math.floor(i*count/names.length);
    const b=Math.max(a,Math.floor((i+1)*count/names.length)-1);
    for(let n=a;n<=b;n++) checked[n]=1;
    if(names.length>count && i%count<count) checked[i%count]=1;
    return {name,checked,note:name==="引渡し"?"完了確認":""};
  });
}
function renderSteps(){
  const box=$("steps");box.innerHTML="";
  steps.forEach((s,si)=>{
    while(s.checked.length<days.length)s.checked.push(0);
    while(s.checked.length>days.length)s.checked.pop();
    const el=document.createElement("div");
    el.className="step";
    el.innerHTML=`<div class="step-head"><input value="${escapeHtml(s.name)}" data-si="${si}" data-kind="name"><button type="button" data-del="${si}">×</button></div>
    <div class="chips">${days.map((d,di)=>`<span class="chip ${s.checked[di]?"on":""}" data-si="${si}" data-di="${di}">${s.checked[di]?"■":"□"} ${escapeHtml(d.label)}</span>`).join("")}</div>
    <div class="field" style="margin:8px 0 0"><label>備考</label><input value="${escapeHtml(s.note)}" data-si="${si}" data-kind="note" placeholder="例：完了確認"></div>`;
    box.appendChild(el);
  });
}
function renderPaper(){
  makeDays();
  steps.forEach(s=>{while(s.checked.length<days.length)s.checked.push(0);while(s.checked.length>days.length)s.checked.pop()});
  const content=val("content"),building=val("building"),contact=val("contact"),company=val("company");
  const info=[
    ["工　事　内　容",content],
    ["工　事　期　間",`${jpDate(val("dateFrom"))} 〜 ${jpDate(val("dateTo"))}`],
    ["作　業　時　間",`${val("timeFrom")} 〜 ${val("timeTo")}（予定）`],
    ["施　工　会　社",company],
    ["担　当　者",contact],
    ["施工対象住戸",`${val("unit")}　（${val("address")}）`]
  ].map(r=>`<tr><td class="lbl">${escapeHtml(r[0])}</td><td>${escapeHtml(r[1])}</td></tr>`).join("");
  const dayWidth=days.length?Math.floor(40/days.length):40;
  const heads=days.map(d=>`<th style="width:${dayWidth}%">${escapeHtml(d.label)}</th>`).join("");
  const rows=steps.map(s=>`<tr><td class="step-label">${escapeHtml(s.name)}</td>${days.map((_,i)=>`<td>${s.checked[i]?"■":""}</td>`).join("")}<td class="note-cell">${escapeHtml(s.note)}</td></tr>`).join("");
  $("paper").innerHTML=`<p class="p-building">${escapeHtml(building)}</p>
  <p class="p-to">${escapeHtml(val("audience"))}</p>
  <div class="p-title-wrap"><span class="p-title">室内リフォーム工事のお知らせ</span><span class="p-subtitle">Interior Renovation Notice</span></div>
  <p class="p-body">拝啓　時下ますますご清栄のことお喜び申し上げます。<br>
  このたび、${escapeHtml(building)}内におきまして、${escapeHtml(content)}工事を実施させていただくこととなりました。<br>
  工事期間中は作業音や搬出入などでご迷惑をおかけする場合がございますが、安全面および近隣への配慮を徹底し、慎重に作業を進めてまいります。<br>
  何卒ご理解とご協力のほどよろしくお願い申し上げます。</p>
  <table class="info-table">${info}</table>
  <p class="note-text">※天候・工事進行状況により、予定が変更となる場合があります。</p>
  <div class="sched-title-wrap"><span class="sched-title">工程表　</span><span class="sched-sub">室内リフォーム（${escapeHtml(content)}）</span></div>
  <table class="sched-table"><thead><tr><th style="text-align:left;padding-left:5pt;">工程名</th>${heads}<th>備考</th></tr></thead><tbody>${rows}</tbody></table>
  <p class="p-footer">完了予定日：${jpDate(val("dateTo"))}　　${escapeHtml(content)}　${escapeHtml(company)}　${escapeHtml(contact)}</p>`;
}
function sync(){makeDays();renderSteps();renderPaper()}
$("projectType").addEventListener("change",e=>{if(e.target.value!=="custom"){$("content").value=e.target.value;distribute(presets[e.target.value]);sync()}});
["building","unit","audience","address","content","dateFrom","dateTo","timeFrom","timeTo","company","contact"].forEach(id=>$(id).addEventListener("input",sync));
$("steps").addEventListener("input",e=>{const si=e.target.dataset.si;if(si===undefined)return;steps[si][e.target.dataset.kind]=e.target.value;renderPaper()});
$("steps").addEventListener("click",e=>{if(e.target.dataset.del!==undefined){steps.splice(Number(e.target.dataset.del),1);sync();return}if(e.target.dataset.di!==undefined){const si=Number(e.target.dataset.si),di=Number(e.target.dataset.di);steps[si].checked[di]=steps[si].checked[di]?0:1;sync()}});
$("addStep").addEventListener("click",()=>{steps.push({name:"新規工程",checked:days.map(()=>0),note:""});sync()});
$("refresh").addEventListener("click",sync);
$("print").addEventListener("click",()=>{renderPaper();setTimeout(()=>window.print(),100)});
distribute(presets["クロス張替（壁紙交換）"]);
sync();
</script>
</body>
</html>
